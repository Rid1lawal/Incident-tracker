apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: incident-api
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      # app: incident-api
      app.kubernetes.io/instance: incident-api
      app.kubernetes.io/name: incident-api
  endpoints:
    - port: http
      path: /metrics
      interval: 15s