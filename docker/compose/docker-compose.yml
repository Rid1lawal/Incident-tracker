services:

  api:
    build:
      context: ../..
      dockerfile: docker/api/Dockerfile

    ports:
        - "8080:8080"

    env_file:
        - ../../api/.env.docker

    depends_on:
        - postgres
        - redis
  postgres:
    image: postgres:17

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/
      
  redis:
    image: redis:8-alpine

    ports:
      - "6379:6379"

volumes:
  postgres-data: