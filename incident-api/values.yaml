replicaCount: 3

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5

image:
  repository: ghcr.io/rid1lawal/incident-api
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

container:
  port: 8080

resources:
  requests:
    cpu: 100m
    memory: 128Mi

  limits:
    cpu: 500m
    memory: 512Mi

httpRoute:
  enabled: false

serviceAccount:
  create: false
  annotations: {}
  name: default

readinessProbe:
  httpGet:
    path: /ready
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 5

livenessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 10

env:
  PORT: "8080"
  DB_HOST: "postgres-postgresql"
  DB_PORT: "5432"
  DB_NAME: "incident_tracker"
  DB_USER: "postgres"
